name: Publish to npm

on:
  release:
    types: [published]
  push:
    branches: [preview]
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Upgrade npm for OIDC trusted publishing
        run: |
          npm install -g npm@latest
          echo "node=$(node -v) npm=$(npm -v)"
      - run: npm ci
      - run: npm --prefix ui install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run typecheck:tests
      - run: npm run test:inventory
      - run: npm run build:server
      - run: npm run build:cli
      - run: npm --prefix ui run build
      - run: npm test
        timeout-minutes: 20
      - run: npm run lint:pkg
      - run: npm run test:package-install
      - name: Verify OIDC preconditions
        run: |
          echo "npm=$(npm -v)"
          npm_major=$(npm -v | cut -d. -f1)
          npm_minor=$(npm -v | cut -d. -f2)
          if [ "$npm_major" -lt 11 ] || { [ "$npm_major" -eq 11 ] && [ "$npm_minor" -lt 5 ]; }; then
            echo "::error::npm >= 11.5.1 required for OIDC trusted publishing (got $(npm -v))"
            exit 1
          fi
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "::error::OIDC token endpoint not available — check id-token: write permission"
            exit 1
          fi
          echo "✓ npm version OK, OIDC endpoint available"
      - name: Set preview version (preview branch push only)
        if: github.event_name != 'release'
        run: |
          PREVIEW=$(node -e "const [a,b,c]=require('./package.json').version.split('-')[0].split('.').map(Number); const d=new Date(); const z=n=>String(n).padStart(2,'0'); const tag=\`\${String(d.getUTCFullYear()).slice(2)}\${z(d.getUTCMonth()+1)}\${z(d.getUTCDate())}\`; process.stdout.write(\`\${a}.\${b}.\${c+1}-preview-\${tag}\`)")
          echo "preview version: $PREVIEW"
          npm version "$PREVIEW" --no-git-tag-version
      - name: Publish (latest on release, preview dist-tag on preview push)
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            npm publish --provenance --access public
          else
            npm publish --tag preview --provenance --access public
          fi
